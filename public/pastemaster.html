<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metfone Express · Paste Master Batch Address Resolver</title>
  <!-- Pre-connect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hanuman:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  
  <link rel="stylesheet" href="style.css?v=3.1.4" />
  
  <style>
    /* Standalone dashboard specific layout styles */
    body {
      background: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: var(--font-sans);
    }
    
    .pm-header {
      background: #1e293b;
      color: white;
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--metfone-red);
      flex-shrink: 0;
    }
    
    .pm-header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      font-family: var(--font-heading);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .pm-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: var(--text-xs);
    }
    
    .pm-dashboard-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    
    /* 3-column split dashboard layout */
    .pm-left-col {
      width: 320px;
      background: white;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      padding: var(--space-4);
      flex-shrink: 0;
    }
    
    .pm-center-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      overflow: hidden;
      border-right: 1px solid #e2e8f0;
    }
    
    .pm-right-col {
      width: 460px;
      background: #f1f5f9;
      position: relative;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    
    #pmMap {
      flex: 1;
      width: 100%;
      height: 100%;
    }
    
    /* Scrollable areas styling */
    .pm-input-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    
    .pm-input-wrapper textarea {
      flex: 1;
      width: 100%;
      min-height: 200px;
      border: 2px solid #e2e8f0;
      border-radius: var(--radius-lg);
      padding: var(--space-3);
      font-size: var(--text-sm);
      font-family: monospace;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .pm-input-wrapper textarea:focus {
      border-color: var(--metfone-red);
    }
    
    .pm-center-header {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid #e2e8f0;
      background: #fafafa;
    }
    
    .pm-table-container {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-4);
    }
    
    .pm-footer {
      padding: var(--space-4) var(--space-6);
      background: white;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .home-link-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    .home-link-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: white;
    }

    /* Table styling overrides for large view */
    .pm-results-table th, .pm-results-table td {
      padding: 12px 14px;
    }
    
    @media (max-width: 1200px) {
      .pm-dashboard-body {
        flex-direction: column;
        overflow: auto;
      }
      .pm-left-col, .pm-center-col, .pm-right-col {
        width: 100%;
        height: auto;
        flex: none;
        border-right: none;
        border-bottom: 1px solid #e2e8f0;
      }
      .pm-right-col {
        height: 350px;
      }
      .pm-left-col {
        height: 400px;
      }
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <header class="pm-header">
    <h1>
      <span>📋</span> Paste Master Address Resolver
    </h1>
    <div class="pm-header-right">
      <span style="font-weight: 700; color: #94a3b8;">Metfone Logistics Network v3.1.4</span>
      <a href="/" class="home-link-btn">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline-block; vertical-align:middle; margin-right:2px;"><polygon points="3 9 9 21 21 9 12 3 3 9"></polygon></svg>
        Go to Map Search
      </a>
    </div>
  </header>

  <!-- 3-Column Dashboard Body -->
  <div class="pm-dashboard-body">
    
    <!-- Column 1: Inputs -->
    <div class="pm-left-col">
      <div class="pm-input-wrapper">
        <label style="font-size: 11px; font-weight: 800; text-transform: uppercase; color: #475569; letter-spacing: 0.05em; display: block; margin-bottom: 8px; font-family: var(--font-heading);">
          1. Raw Address Input (One per line)
        </label>
        <textarea 
          id="pmRawInput" 
          placeholder="Paste address keywords here. Example:&#10;ផ្ទះបងនៅម្ដុំបាលីរីសតភូមិត្រពាំងល្វាសង្កាត់កាកាប ពោធិ៍សែនជ័យ&#10;បឹងកេងកង&#10;ផ្សារទួលពង្រ&#10;ក្រោយវត្តស្ទឹងមានជ័យ&#10;សាកលវិទ្យាល័យភូមិន្ទវិចិត្រសិល្បៈថ្មីជ្រោយចង្វារ"
          spellcheck="false"
        ></textarea>
        <button id="pmRunBtn" class="pm-btn pm-btn-primary" style="margin-top: 12px; width: 100%; font-weight: 800;">
          ⚡ Resolve Addresses
        </button>
      </div>
    </div>
    
    <!-- Column 2: Results Table -->
    <div class="pm-center-col">
      <div class="pm-center-header">
        <label style="font-size: 11px; font-weight: 800; text-transform: uppercase; color: #475569; letter-spacing: 0.05em; display: block; font-family: var(--font-heading);">
          2. Structured Results & Disambiguation
        </label>
      </div>
      
      <div class="pm-table-container">
        <div class="pm-table-wrapper">
          <table class="pm-results-table">
            <thead>
              <tr>
                <th style="width: 50px; text-align: center;">Line</th>
                <th>Raw Address</th>
                <th>Resolved Location</th>
                <th style="width: 100px; text-align: center;">Status</th>
                <th>Nearest Post Office</th>
              </tr>
            </thead>
            <tbody id="pmResultsBody">
              <tr>
                <td colspan="5" class="pm-empty-cell">
                  <div style="font-size: 2.5rem; margin-bottom: 8px;">📋</div>
                  No data resolved. Paste address list on the left and click "Resolve Addresses".
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    
    <!-- Column 3: Leaflet Map -->
    <div class="pm-right-col">
      <div style="padding: 10px 16px; background: #e2e8f0; border-bottom: 1px solid #cbd5e1; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing:0.05em; font-family: var(--font-heading);">
        3. Real-Time Mapped Markers
      </div>
      <div id="pmMap"></div>
    </div>

  </div>

  <!-- Dashboard Footer -->
  <footer class="pm-footer">
    <div id="pmStats" style="font-size: var(--text-xs); color: #475569; font-weight: 700; font-family: var(--font-sans);">
      Resolved: 0 / 0 rows (0% complete)
    </div>
    <div style="display: flex; gap: 8px;">
      <button id="pmClearBtn" class="pm-btn pm-btn-danger">Clear</button>
      <button id="pmPlotBtn" class="pm-btn pm-btn-secondary" disabled>Plot Markers</button>
      <button id="pmExportBtn" class="pm-btn pm-btn-success" disabled>Export CSV</button>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  <script src="pastemaster.js?v=3.1.4"></script>

</body>
</html>
